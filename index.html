<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Kyle Kochi — Mechanical Engineer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0e0e0e;
      --border: #2a2a2a;
      --text: #f0ede8;
      --muted: #6b6b6b;
      --accent: #d4ff4e;
      --accent-dim: rgba(212, 255, 78, 0.08);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      overflow: auto;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 48px 48px;
      opacity: 0.35;
      pointer-events: none;
    }

    .container {
      position: relative;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: flex-start;
      padding: clamp(2rem, 8vw, 7rem);
      z-index: 1;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 2.5rem;
      opacity: 0;
      animation: fadeUp 0.6s 0.1s forwards;
    }
    .tag::before {
      content: '';
      display: block;
      width: 20px;
      height: 1px;
      background: var(--accent);
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: clamp(3rem, 9vw, 8rem);
      line-height: 0.92;
      letter-spacing: -0.03em;
      margin-bottom: 1.5rem;
      opacity: 0;
      animation: fadeUp 0.6s 0.25s forwards;
    }
    h1 a { text-decoration: none; color: inherit; }
    h1 a:hover span { opacity: 0.75; }
    h1 span { color: var(--accent); transition: opacity 0.2s; }

    .descriptor {
      font-size: clamp(0.8rem, 1.5vw, 1rem);
      color: var(--muted);
      letter-spacing: 0.04em;
      max-width: 420px;
      line-height: 1.7;
      margin-bottom: 3.5rem;
      opacity: 0;
      animation: fadeUp 0.6s 0.4s forwards;
    }

    .actions {
      display: flex;
      align-items: center;
      gap: 1.5rem;
      flex-wrap: wrap;
      opacity: 0;
      animation: fadeUp 0.6s 0.55s forwards;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      background: var(--accent);
      color: #0e0e0e;
      font-family: 'DM Mono', monospace;
      font-size: 0.78rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      text-decoration: none;
      padding: 0.9rem 1.8rem;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    .btn-primary:hover {
      transform: translate(-2px, -2px);
      box-shadow: 4px 4px 0 rgba(212,255,78,0.3);
    }

    .btn-outline {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      background: transparent;
      color: var(--accent);
      font-family: 'DM Mono', monospace;
      font-size: 0.78rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      text-decoration: none;
      padding: 0.9rem 1.8rem;
      border: 1px solid var(--accent);
      transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
    }
    .btn-outline:hover {
      background: var(--accent-dim);
      transform: translate(-2px, -2px);
      box-shadow: 4px 4px 0 rgba(212,255,78,0.15);
    }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-family: 'DM Mono', monospace;
      font-size: 0.78rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
      border-bottom: 1px solid var(--border);
      padding-bottom: 2px;
      transition: color 0.2s, border-color 0.2s;
    }
    .btn-secondary:hover { color: var(--text); border-color: var(--text); }

    .corner-mark {
      position: fixed;
      bottom: 2.5rem;
      left: clamp(2rem, 5vw, 4rem);
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      color: var(--border);
      text-transform: uppercase;
      opacity: 0;
      animation: fadeUp 0.6s 1s forwards;
    }

    .enter-prompt {
      position: fixed;
      bottom: 2.5rem;
      right: clamp(2rem, 5vw, 4rem);
      opacity: 0;
      animation: fadeUp 0.6s 1.1s forwards;
    }
    .enter-prompt a {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.2s;
    }
    .enter-prompt a:hover { color: var(--accent); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

<div class="container">
  <div class="tag">Portfolio</div>

  <h1><a href="work.html">Kyle<br><span>Kochi</span></a></h1>

  <p class="descriptor">
    Mechatronics Engineer who builds things that move — robotics, automation, and embedded systems.
  </p>

  <div class="actions">
    <a class="btn-primary" href="https://drive.google.com/file/d/1b00vt0k8SHK85yGIdmgir9lypije0_bU/view?usp=sharing" target="_blank">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Portfolio
    </a>
    <a class="btn-outline" href="https://drive.google.com/file/d/1Dq3fDtBLFxJKV7Z5hT5R1JmiJFAF5LLO/view?usp=sharing" target="_blank">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
      Resume
    </a>
    <a class="btn-secondary" href="https://linkedin.com/in/kylekochi" target="_blank">LinkedIn ↗</a>
    <a class="btn-secondary" id="email-btn">Email ↗</a>
    <a class="btn-secondary" href="work.html">Work ↗</a>
  </div>
</div>

<div class="corner-mark" id="corner-email"></div>
<div class="enter-prompt"><a href="work.html">Enter ↘</a></div>

<script>
  var e = 'kochikyle01' + '@' + 'gmail.com';
  document.getElementById('email-btn').href = 'mailto:' + e;
  document.getElementById('corner-email').textContent = e;
</script>

</body>
</html>
